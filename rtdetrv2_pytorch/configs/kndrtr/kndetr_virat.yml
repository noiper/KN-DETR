__include__: [
  '../dataset/virat_detection.yml',
  '../runtime.yml',
  '../rtdetrv2/include/dataloader.yml',
  '../rtdetrv2/include/optimizer.yml',
  '../rtdetrv2/include/rtdetrv2_r50vd.yml',
]

tuning: ./models/rtdetrv2_r18vd_120e_coco.pth
output_dir: ./output/kndetr_virat

num_classes: 2

# ResNet-18 backbone
PResNet: 
  depth: 18
  freeze_at: 4
  freeze_norm: True
  pretrained: False

HybridEncoder:
  in_channels: [128, 256, 512]
  hidden_dim: 256
  expansion: 0.5
  dropout: 0.1

RTDETRTransformerv2:
  num_layers: 3
  num_denoising: 0
  dropout: 0.1

epoches: 10
use_focal_loss: True

optimizer:
  type: AdamW
  params:
    - 
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.000005
    - 
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.
  lr: 0.00005
  betas: [0.9, 0.999]
  weight_decay: 0.001

# ⭐ Gentler LR schedule
LRScheduler:
  type: MultiStepLR
  milestones: [40, 50]
  gamma: 0.1

LRWarmup:
  type: LinearWarmup
  warmup_duration: 5

train_dataloader: 
  total_batch_size: 16
  shuffle: true
  num_workers: 4
  drop_last: true
  dataset: 
    transforms:
      policy:
        name: stop_epoch
        epoch: 55
        ops: ['RandomPhotometricDistort', 'RandomZoomOut', 'RandomIoUCrop', 'RandomHorizontalFlip']
  collate_fn:
    scales: ~

val_dataloader:
  total_batch_size: 16