__include__:  [
  '../dataset/visdrone_vid_detection.yml',
  '../runtime.yml',
  './include/dataloader.yml',
  './include/optimizer.yml',
  './include/rtdetrv2_r50vd.yml',
]

tuning:  ./rtdetrv2_r18vd_120e_coco.pth

output_dir: ./output/rtdetrv2_r18vd_visdrone

num_classes: 11

PResNet:  
  depth: 18

HybridEncoder:
  in_channels: [128, 256, 512]
  hidden_dim: 256
  expansion:  0.5

RTDETRTransformerv2:
  num_layers: 3

epoches: 10

optimizer: 
  type: AdamW
  params: 
    - 
      params: '^(?=.*backbone\.layer[234])(?!.*(?:norm|bn)).*$'
      lr: 0.000005
    - 
      params:  '^(?=.*backbone)(?=.*(?:norm|bn)).*$'
      weight_decay: 0.
    - 
      params:  '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.
  
  lr: 0.00005
  betas: [0.9, 0.999]
  weight_decay: 0.0001

lr_scheduler:
  type: MultiStepLR
  milestones: [40, 50]
  gamma: 0.1

lr_warmup_scheduler:  
  type: LinearWarmup
  warmup_duration: 5        # Longer warmup

train_dataloader: 
  total_batch_size: 16
  shuffle: true
  num_workers: 4
  drop_last: true
  dataset: 
    transforms:
      policy:
        name: stop_epoch
        epoch: 55
        ops: ['RandomPhotometricDistort', 'RandomZoomOut', 'RandomIoUCrop', 'RandomHorizontalFlip']
  collate_fn:
    scales: ~

val_dataloader:
  total_batch_size: 16